<!DOCTYPE html>
<html>
<head>
    <title>AI SaaS Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            color: white;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
        }
        .subdomain-info {
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 15px;
            margin-top: 30px;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 8px;
            margin: 10px;
            font-weight: bold;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 AI SaaS Platform</h1>
        <p>Multi-Tenant Workflow Management with AI</p>
        
        {% if subdomain %}
        <div class="subdomain-info">
            <strong>Tenant Subdomain:</strong> {{ subdomain }}
            {% if tenant %}
            <br>Company: {{ tenant.name }}
            <br>Plan: {{ tenant.plan|title }}
            {% endif %}
        </div>
        {% endif %}
        
        <div>
            <a href="/login/" class="btn">🔐 Login</a>
        </div>
    </div>
</body>
</html>
