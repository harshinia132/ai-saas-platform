<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Project</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f7fb; }
        .container { max-width: 500px; margin: 100px auto; background: white; padding: 30px; border-radius: 15px; text-align: center; }
        h1 { color: #dc3545; margin-bottom: 20px; }
        p { margin-bottom: 25px; color: #666; }
        .btn-danger { background: #dc3545; color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; }
        .btn-back { background: #6c757d; color: white; padding: 12px 24px; text-decoration: none; border-radius: 8px; margin-left: 10px; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚠️ Delete Project</h1>
        <p>Are you sure you want to delete "<strong>{{ project.name }}</strong>"?</p>
        <p>This action cannot be undone and will delete all tasks in this project.</p>
        <form method="post" style="display: inline;">
            {% csrf_token %}
            <button type="submit" class="btn-danger">Yes, Delete</button>
        </form>
        <a href="{% url 'project_list' %}" class="btn-back">Cancel</a>
    </div>
</body>
</html>
