<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Project</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f7fb; }
        .container { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { margin-bottom: 25px; color: #333; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: #555; }
        input, textarea, select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; }
        .btn-back { background: #6c757d; margin-right: 10px; text-decoration: none; padding: 12px 24px; border-radius: 8px; color: white; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✏️ Edit Project</h1>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Project Name</label>
                <input type="text" name="name" value="{{ project.name }}" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="4">{{ project.description }}</textarea>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select name="status">
                    <option value="planning" {% if project.status == 'planning' %}selected{% endif %}>Planning</option>
                    <option value="active" {% if project.status == 'active' %}selected{% endif %}>Active</option>
                    <option value="completed" {% if project.status == 'completed' %}selected{% endif %}>Completed</option>
                </select>
            </div>
            <div class="form-group">
                <label>Due Date</label>
                <input type="date" name="due_date" value="{{ project.due_date|date:'Y-m-d' }}">
            </div>
            <button type="submit">Save Changes</button>
            <a href="{% url 'project_list' %}" class="btn-back">Cancel</a>
        </form>
    </div>
</body>
</html>
