<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Task</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f7fb; }
        
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            color: white;
        }
        
        .logo { font-size: 24px; font-weight: bold; margin-bottom: 40px; }
        .nav-item { padding: 12px 15px; margin: 5px 0; border-radius: 10px; }
        .nav-item:hover { background: rgba(255,255,255,0.2); }
        .nav-item a { color: white; text-decoration: none; display: block; }
        
        .main-content { margin-left: 260px; padding: 30px; }
        .container { max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; text-align: center; }
        h1 { color: #dc3545; margin-bottom: 20px; }
        p { margin-bottom: 25px; color: #666; }
        .btn-danger { background: #dc3545; color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; }
        .btn-back { background: #6c757d; text-decoration: none; padding: 12px 24px; border-radius: 8px; color: white; display: inline-block; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">🚀 AI SaaS Platform</div>
        <div class="nav-item"><a href="/projects/">📁 Projects</a></div>
        <div class="nav-item"><a href="/tasks/">✅ Tasks</a></div>
        <div class="nav-item"><a href="/ai-dashboard/">🤖 AI Dashboard</a></div>
        <div class="nav-item"><a href="/admin/">⚙️ Admin</a></div>
        <div class="nav-item"><a href="/logout/">🚪 Logout</a></div>
    </div>
    
    <div class="main-content">
        <div class="container">
            <h1>⚠️ Delete Task</h1>
            <p>Are you sure you want to delete "<strong>{{ task.title }}</strong>"?</p>
            <p>This action cannot be undone.</p>
            <form method="post" style="display: inline;">
                {% csrf_token %}
                <button type="submit" class="btn-danger">Yes, Delete</button>
            </form>
            <a href="/tasks/" class="btn-back">Cancel</a>
        </div>
    </div>
</body>
</html>
