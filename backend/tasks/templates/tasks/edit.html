<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Task</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f7fb; }
        
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            color: white;
        }
        
        .logo { font-size: 24px; font-weight: bold; margin-bottom: 40px; }
        .nav-item { padding: 12px 15px; margin: 5px 0; border-radius: 10px; }
        .nav-item:hover { background: rgba(255,255,255,0.2); }
        .nav-item a { color: white; text-decoration: none; display: block; }
        
        .main-content { margin-left: 260px; padding: 30px; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 15px; }
        h1 { margin-bottom: 25px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        input, textarea, select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; }
        .btn-back { background: #6c757d; text-decoration: none; padding: 12px 24px; border-radius: 8px; color: white; display: inline-block; margin-right: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">🚀 AI SaaS Platform</div>
        <div class="nav-item"><a href="/projects/">📁 Projects</a></div>
        <div class="nav-item"><a href="/tasks/">✅ Tasks</a></div>
        <div class="nav-item"><a href="/ai-dashboard/">🤖 AI Dashboard</a></div>
        <div class="nav-item"><a href="/admin/">⚙️ Admin</a></div>
        <div class="nav-item"><a href="/logout/">🚪 Logout</a></div>
    </div>
    
    <div class="main-content">
        <div class="container">
            <h1>✏️ Edit Task</h1>
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label>Task Title</label>
                    <input type="text" name="title" value="{{ task.title }}" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" rows="4">{{ task.description }}</textarea>
                </div>
                <div class="form-group">
                    <label>Project</label>
                    <select name="project" required>
                        {% for project in projects %}
                        <option value="{{ project.id }}" {% if task.project.id == project.id %}selected{% endif %}>{{ project.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Assignee</label>
                    <select name="assignee">
                        <option value="">Select Assignee</option>
                        {% for user in users %}
                        <option value="{{ user.id }}" {% if task.assignee.id == user.id %}selected{% endif %}>{{ user.email }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Priority</label>
                    <select name="priority">
                        <option value="low" {% if task.priority == 'low' %}selected{% endif %}>Low</option>
                        <option value="medium" {% if task.priority == 'medium' %}selected{% endif %}>Medium</option>
                        <option value="high" {% if task.priority == 'high' %}selected{% endif %}>High</option>
                        <option value="urgent" {% if task.priority == 'urgent' %}selected{% endif %}>Urgent</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select name="status">
                        <option value="todo" {% if task.status == 'todo' %}selected{% endif %}>To Do</option>
                        <option value="in_progress" {% if task.status == 'in_progress' %}selected{% endif %}>In Progress</option>
                        <option value="completed" {% if task.status == 'completed' %}selected{% endif %}>Completed</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Due Date</label>
                    <input type="date" name="due_date" value="{{ task.due_date|date:'Y-m-d' }}">
                </div>
                <a href="/tasks/" class="btn-back">Cancel</a>
                <button type="submit">Save Changes</button>
            </form>
        </div>
    </div>
</body>
</html>
